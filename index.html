<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bus Route (TSP Cycle)</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Card */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:18px;
  margin-top:20px;
  width:90%;
  max-width:800px;
}

/* Controls */
.controls {
  display:flex;
  justify-content:center;
  gap:10px;
}

select {
  padding:10px;
  border-radius:8px;
  border:none;
}

/* Button */
button {
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
}

/* Result */
.result-box {
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background: rgba(255,255,255,0.15);
}

canvas {
  margin-top:20px;
  border-radius:12px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<h1>🚌 Bus Route (TSP Cycle)</h1>

<div class="card">

<div class="controls">
  <select id="start"></select>
  <button onclick="runTSP()">Find Route</button>
</div>

<div class="result-box">
  <div id="route"></div>
  <div id="cost"></div>
</div>

<canvas id="map" width="750" height="420"></canvas>

</div>

<script>
// ===== GRAPH =====
const nodes = {
  "Main Gate": {x:80,y:300},
  "Hostel": {x:150,y:80},
  "Tech Park": {x:420,y:60},
  "Library": {x:600,y:220},
  "Admin Block": {x:350,y:300},
  "Canteen": {x:250,y:200}
};

const edges = [
 ["Main Gate","Admin Block",150],
 ["Main Gate","Hostel",320],
 ["Hostel","Tech Park",280],
 ["Hostel","Canteen",200],
 ["Tech Park","Library",230],
 ["Tech Park","Canteen",180],
 ["Canteen","Admin Block",160],
 ["Canteen","Library",210],
 ["Admin Block","Library",300],
 ["Admin Block","Tech Park",350]
];

const graph = {};
Object.keys(nodes).forEach(n=>graph[n]=[]);
edges.forEach(([a,b,w])=>{
  graph[a].push({to:b,dist:w});
  graph[b].push({to:a,dist:w});
});

// ===== GET COST =====
function getCost(a,b){
  for(const [x,y,w] of edges){
    if((x===a && y===b)||(x===b && y===a)){
      return w;
    }
  }
  return 0;
}

// ===== TSP CYCLE =====
function tsp(start){
  let minCost = Infinity;
  let bestRoute = [];

  function backtrack(curr, visited, route, cost){
    if(visited.size === Object.keys(nodes).length){

      const returnCost = getCost(curr, start);

      if(returnCost > 0){
        const totalCost = cost + returnCost;

        if(totalCost < minCost){
          minCost = totalCost;
          bestRoute = [...route, start]; // return to start
        }
      }
      return;
    }

    for(const {to,dist} of graph[curr]){
      if(!visited.has(to)){
        visited.add(to);
        route.push(to);

        backtrack(to, visited, route, cost + dist);

        visited.delete(to);
        route.pop();
      }
    }
  }

  const visited = new Set([start]);
  backtrack(start, visited, [start], 0);

  return {route:bestRoute, cost:minCost};
}

// ===== UI =====
const startSel = document.getElementById("start");
Object.keys(nodes).forEach(n=>{
  startSel.add(new Option(n,n));
});

// ===== DRAW =====
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

function draw(path=[]){
  ctx.clearRect(0,0,750,420);

  // edges
  edges.forEach(([a,b,w])=>{
    ctx.beginPath();
    ctx.moveTo(nodes[a].x,nodes[a].y);
    ctx.lineTo(nodes[b].x,nodes[b].y);
    ctx.strokeStyle="#94a3b8";
    ctx.stroke();

    ctx.fillStyle="white";
    ctx.fillText(w,
      (nodes[a].x+nodes[b].x)/2,
      (nodes[a].y+nodes[b].y)/2);
  });

  // path
  for(let i=0;i<path.length-1;i++){
    ctx.beginPath();
    ctx.moveTo(nodes[path[i]].x,nodes[path[i]].y);
    ctx.lineTo(nodes[path[i+1]].x,nodes[path[i+1]].y);
    ctx.strokeStyle="#ef4444";
    ctx.lineWidth=4;
    ctx.stroke();

    const x = (nodes[path[i]].x+nodes[path[i+1]].x)/2;
    const y = (nodes[path[i]].y+nodes[path[i+1]].y)/2;

    ctx.fillStyle="#22c55e";
    ctx.fillText(getCost(path[i],path[i+1]),x,y);
  }

  // nodes
  Object.keys(nodes).forEach(n=>{
    let color="#3b82f6";
    if(path.includes(n)) color="#22c55e";

    ctx.beginPath();
    ctx.arc(nodes[n].x,nodes[n].y,12,0,2*Math.PI);
    ctx.fillStyle=color;
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText(n,nodes[n].x-25,nodes[n].y-15);
  });
}

// ===== RUN =====
function runTSP(){
  const start = startSel.value;

  const res = tsp(start);

  if(res.route.length===0){
    document.getElementById("route").innerText="No route found";
    document.getElementById("cost").innerText="";
    return;
  }

  document.getElementById("route").innerText =
    res.route.join(" → ");

  document.getElementById("cost").innerText =
    "Total Cost (Cycle): " + res.cost;

  draw(res.route);
}

// init
draw();
</script>

</body>
</html>
